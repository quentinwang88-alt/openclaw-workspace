ai_shot_risk:
  forbidden_to_negative: true
  high_risk_to_negative: true
  face_policy: allow_all
  clothing_full_upper_body: encourage
  registry:
    earrings:
      forbidden: [戴耳环动作, 手指进入耳部, 手触耳饰调整, 撩头发到耳后过程帧, 大幅转头, 剧烈流苏摆动]
      high_risk: [只拍近景细节不拍佩戴结果, 关键结构被遮挡, 人物比商品更抢眼]
    bracelets:
      forbidden: [复杂扣戴过程, 大幅甩手, 手链剧烈摆动, 拍成项链或耳饰, 多只手遮挡商品]
      high_risk: [只拍近景细节不拍佩戴结果, 关键吊坠被遮挡, 手腕动作压过商品]
    hair_accessories:
      forbidden: [手头发发饰长时间纠缠同框, 复杂盘发过程, 大幅甩头, 反复调整发饰位置]
      high_risk: [发饰被头发遮住, 只拍发型不拍发饰结果, 人物动作压过商品]
    womens_outerwear:
      forbidden: [长时间只拍局部不拍轮廓, 过度走位致版型看不清, 拍成纯情绪片不给上身结果]
      high_risk: [缺少至少一个完整上身结果镜, proof没有回答版型或搭配问题, 人物穿搭层级过强压过主商品]
      positive_encouragement: [保留完整上身结果镜, 半步后退看整体轮廓]
    scarves_hats:
      forbidden: [关键佩戴结果被遮挡, 用特效代替proof]
      high_risk: [配饰被衣领或头发遮住, 人物动作压过商品]

