base:
  positive_prefix: "真实TikTok生活化风格，单镜头一镜到底，自然手持感，真实光线，4秒。"
  negative_l1_zh:
    - "不要切镜"
    - "不要转场"
    - "不要分屏"
    - "不要水印"
    - "不要字幕"
    - "不要文字"
    - "不要竞品logo"
    - "商品变形"
    - "错品类"

negative_policy:
  l2_max_items: 6

prompt_bank:
  hair_accessories:
    family_word: "发饰"
    negative_l1_zh: []
    negative_l2_zh:
      - "不要变形头发"
      - "不要多余手指"
      - "不要融化的发饰形状"
      - "不要塑料假感"
    default_person_framing: "ai_local"
    segments:
      product_display:
        positive_zh: "带有{关键锚点}的{家族词}特写，指尖拿着，产品细节清晰为主体，柔和干净背景，自然光"
        motion_arc_zh:
          A: "拿起发夹，然后夹上头发，然后轻微停顿"
          B: "指尖拿起发饰，然后轻轻转动，然后清楚停留"
          C: "发饰在柔光里，然后轻微移动，然后自然露出"
      mirror_routine:
        positive_zh: "在镜子前把{家族词}夹进头发，捕捉夹上那一刻，后脑或侧面角度，梳妆台暖光，{关键锚点}清楚可见"
        motion_arc_zh:
          A: "拿起发夹，然后夹上头发，然后轻微停顿"
          B: "手靠近头发，然后调整发饰，然后微微侧头"
          C: "镜前整理头发，然后发饰露出，然后自然停留"
      home_lifestyle:
        positive_zh: "居家放松时刻，头发上戴着{家族词}，日常慵懒感，窗边柔光，{关键锚点}自然可见"
        motion_arc_zh:
          A: "手靠近头发，然后调整发饰，然后微微侧头"
          B: "坐在窗边，然后轻整理头发，然后发饰停留在光里"
          C: "头发在光里，然后缓慢转头，然后发饰反光"
      before_go_out:
        positive_zh: "出门前快速整理头上的{家族词}，镜前匆忙自然感，{关键锚点}短暂清楚露出"
        motion_arc_zh:
          A: "拿起发夹，然后夹上头发，然后轻微停顿"
          B: "手靠近头发，然后调整发饰，然后微微侧头"
          C: "镜前转身，然后发饰露出，然后准备出门"
      seasonal_scene:
        positive_zh: "户外随手拍，戴着{家族词}，头发轻轻飘动，转头时发饰反光，环境氛围光，{关键锚点}自然露出"
        motion_arc_zh:
          A: "手靠近头发，然后调整发饰，然后微微侧头"
          B: "头发在光里，然后缓慢转头，然后发饰反光"
          C: "户外微风里，然后缓慢转头，然后发饰闪一下"

  scarves_hats:
    family_word: "围巾/帽子"
    negative_l1_zh: []
    negative_l2_zh:
      - "不要变形针织纹理"
      - "不要融化面料"
      - "不要错误的围法"
      - "不要塑料假羊毛"
    default_person_framing: "ai_local"
    segments:
      product_display:
        positive_zh: "带有{关键锚点}的{家族词}特写，面料质感和针织纹理清晰，产品为主体，柔和自然光"
        motion_arc_zh:
          A: "拿起围巾，然后靠近镜头，然后纹理清楚停留"
          B: "手扶面料，然后轻轻转动，然后细节停留"
          C: "配饰在暖光里，然后轻微移动，然后自然露出"
      before_go_out:
        positive_zh: "出门前把{家族词}围上脖子或戴上帽子，捕捉佩戴那一刻，侧面或背面角度，玄关暖光，{关键锚点}可见"
        motion_arc_zh:
          A: "拿起围巾，然后绕上脖子，然后停顿"
          B: "戴上帽子，然后调整帽檐，然后侧头"
          C: "玄关前整理，然后轻轻转身，然后准备出门"
      mirror_routine:
        positive_zh: "镜前戴着{家族词}整理，随手调整，居家柔光，面料垂感可见，{关键锚点}清楚"
        motion_arc_zh:
          A: "拿起围巾，然后绕上脖子，然后停顿"
          B: "戴上帽子，然后调整帽檐，然后侧头"
          C: "镜前抚平面料，然后侧身，然后自然停住"
      home_lifestyle:
        positive_zh: "居家冬日氛围，松松戴着{家族词}，温暖毛毯感，暖光，{关键锚点}自然出现"
        motion_arc_zh:
          A: "手扶面料，然后轻轻转动，然后细节停留"
          B: "抚平面料，然后侧面展示，然后停顿"
          C: "坐在暖光里，然后围巾轻摆，然后慢慢停住"
      seasonal_scene:
        positive_zh: "寒冷户外街景，戴着{家族词}，冬日白光，围巾在风里轻摆，{关键锚点}自然可见"
        motion_arc_zh:
          A: "站在冷光里，然后围巾轻摆，然后缓慢转身"
          B: "走在街边，然后配饰随动作轻摆，然后停顿"
          C: "冬日街景里，然后轻轻转身，然后氛围停留"

  earrings:
    family_word: "耳饰"
    negative_l1_zh: []
    negative_l2_zh:
      - "不要变形耳垂"
      - "不要多余耳饰"
      - "不要融化金属"
      - "不要左右不对称错配"
      - "不要模糊产品"
    default_person_framing: "ai_local"
    segments:
      product_display:
        positive_zh: "带有{关键锚点}的{家族词}已戴好结果展示，耳饰微距特写，珠宝细节和光泽清晰，产品锐利对焦为主体，浅景深，柔和打光"
        motion_arc_zh:
          A: "耳饰已在侧面清楚出现，然后微微侧转，然后光泽停留"
          B: "耳侧近景开始，然后焦点拉到耳饰，然后光泽停留"
          C: "暖光里靠近耳侧，然后轻微转头，然后耳饰反光"
      mirror_routine:
        positive_zh: "镜前已戴好{家族词}后的确认，耳饰在侧面清楚可见，贴近耳侧的裁切，梳妆台柔光，{关键锚点}清楚"
        motion_arc_zh:
          A: "镜前确认耳饰，然后微微侧转，然后光泽停留"
          B: "耳饰已戴好入镜，然后轻微侧转，然后停留"
          C: "镜前靠近耳侧，然后确认光泽，然后停顿"
      home_lifestyle:
        positive_zh: "居家放松，戴着{家族词}，轻微转头展示耳饰，暖光柔和，{关键锚点}自然闪一下"
        motion_arc_zh:
          A: "轻触耳朵，然后戴稳，然后轻转头"
          B: "手整理头发，然后耳饰露出，然后停留"
          C: "头在暖光里，然后缓慢转动，然后耳饰反光"
      seasonal_scene:
        positive_zh: "暖调氛围场景，转头让{家族词}在光里闪烁，耳饰可不在中心，虚化背景，{关键锚点}短暂可见"
        motion_arc_zh:
          A: "轻触耳朵，然后戴稳，然后轻转头"
          B: "头在暖光里，然后缓慢转动，然后耳饰反光"
          C: "背景虚化，然后轻轻转头，然后耳饰闪光"
      before_go_out:
        positive_zh: "出门前最后点缀，轻触耳边的{家族词}，自然准备瞬间，{关键锚点}清楚露出"
        motion_arc_zh:
          A: "指尖拿耳饰，然后扣上耳朵，然后小幅转头展示反光"
          B: "轻触耳朵，然后戴稳，然后轻转头"
          C: "整理头发，然后耳饰露出，然后准备出门"

  bracelets:
    family_word: "手链"
    negative_l1_zh: []
    negative_l2_zh:
      - "不要变形手腕"
      - "不要多余首饰"
      - "不要融化金属"
      - "不要链节断裂"
      - "不要拍成项链或耳饰"
      - "不要模糊吊坠"
    default_person_framing: "ai_local"
    segments:
      product_display:
        positive_zh: "带有{关键锚点}的{家族词}已戴好结果展示，手腕近景或托盘展示，链型、吊坠和金属光泽清晰，产品锐利对焦为主体，浅景深，柔和打光"
        motion_arc_zh:
          A: "手链已在手腕清楚出现，然后手腕轻微转动，然后光泽停留"
          B: "手腕近景开始，然后焦点拉到手链，然后吊坠清楚停留"
          C: "暖光里靠近手腕，然后轻微转动，然后手链反光"
      mirror_routine:
        positive_zh: "镜前已戴好{家族词}后的确认，手链在手腕侧面清楚可见，贴近手腕的裁切，梳妆台柔光，{关键锚点}清楚"
        motion_arc_zh:
          A: "镜前确认手链，然后手腕轻转，然后光泽停留"
          B: "手链已戴好入镜，然后轻微转动，然后停留"
          C: "镜前靠近手腕，然后确认吊坠光泽，然后停顿"
      home_lifestyle:
        positive_zh: "居家放松，手腕上戴着{家族词}，拿杯子或整理小物时自然露出，暖光柔和，{关键锚点}自然闪一下"
        motion_arc_zh:
          A: "手腕轻抬拿起小物，然后手链露出，然后光泽停留"
          B: "手放在桌边，然后焦点到手链，然后轻微转动"
          C: "手腕在暖光里，然后自然移动，然后手链反光"
      before_go_out:
        positive_zh: "出门前最后确认手腕上的{家族词}，手腕局部近景，准备拿包或扣好手链后的瞬间，{关键锚点}清楚露出"
        motion_arc_zh:
          A: "手腕入镜，然后确认手链位置，然后轻微停顿"
          B: "指尖轻扶吊坠，然后手腕转向光线，然后清楚停留"
          C: "拿包前手腕轻转，然后手链闪一下，然后准备出门"
      seasonal_scene:
        positive_zh: "日常氛围场景，手腕轻转让{家族词}在光里闪烁，手链可不在中心，虚化背景，{关键锚点}短暂可见"
        motion_arc_zh:
          A: "手腕轻转，然后吊坠反光，然后停留"
          B: "背景虚化，然后手腕自然移动，然后手链闪光"
          C: "柔光里轻轻抬手，然后手链露出，然后氛围停留"

  womens_outerwear:
    family_word: "女装外套"
    negative_l1_zh:
      - "全身正面导致版型失真"
      - "前后帧衣服不一致"
    negative_l2_zh:
      - "错误廓形"
      - "变形衣形"
      - "错误袖长"
      - "错误衣长"
      - "塑料假面料"
      - "纸片薄面料"
      - "融化的缝线"
      - "不对称衣领"
      - "错配品类为非夹克类上衣(如T恤/衬衫/卫衣)"
      - "错配衣长为长款/常规款未保留短款露腰"
      - "错配领型为翻领/连帽等非罗纹立领"
      - "缺失胸前双翻盖口袋结构"
      - "错配开合方式为拉链/无扣等非按扣"
      - "错配材质为皮质/牛仔/针织等非斜纹"
      - "错配版型为紧身款未保留宽松落肩"
      - "夸张广告表演"
    default_person_framing: "ai_local"
    segments:
      product_display:
        positive_zh: "带有{关键锚点}的{家族词}，廓形版型清晰，面料垂感和质感可见，完整衣形，衣领袖口细节，自然正面、侧面或背影均可，对焦在衣服上，柔和自然光"
        motion_arc_zh:
          A: "拿起大衣，然后穿上，然后整理肩部，廓形成型"
          B: "手扶衣摆，然后轻微侧转，然后衣形停留"
          C: "衣服在自然光里，然后轻微摆动，然后廓形停住"
      before_go_out:
        positive_zh: "出门前穿上{家族词}，穿衣动作，自然正面或侧面角度，保留完整上身结果镜，玄关光，穿上时衣形成型，{关键锚点}清楚"
        motion_arc_zh:
          A: "拿起大衣，然后穿上，然后整理肩部，廓形成型"
          B: "穿上，然后整理衣领，然后侧转展示垂感"
          C: "玄关前转身，然后衣摆轻动，然后停顿"
      tryon_result:
        positive_zh: "穿着{家族词}展示上身效果，自然正面或侧面角度，保留完整上身结果镜，版型和衣长比例清楚，{关键锚点}稳定可见，自然光"
        motion_arc_zh:
          A: "半步后退看整体，然后轻整理衣领，然后上身轮廓停留"
          B: "轻微侧转展示版型，然后整理衣摆，然后效果停留"
          C: "自然站定，然后衣摆轻动，然后整体比例停留"
      mirror_routine:
        positive_zh: "镜前穿着{家族词}整理衣领袖口，侧面角度，居家柔光，面料摆动可见，{关键锚点}清楚"
        motion_arc_zh:
          A: "穿上，然后整理衣领，然后侧转展示垂感"
          B: "整理袖口，然后侧面展示，然后衣服停留"
          C: "镜前轻转身，然后衣摆摆动，然后自然停住"
      home_lifestyle:
        positive_zh: "居家松松披着{家族词}，温暖放松，暖光，面料垂感可见，{关键锚点}自然出现"
        motion_arc_zh:
          A: "穿上，然后整理衣领，然后侧转展示垂感"
          B: "坐下前整理衣摆，然后面料垂落，然后停顿"
          C: "暖光里轻轻移动，然后外套自然垂下，然后停住"
      seasonal_scene:
        positive_zh: "寒冷户外，穿着{家族词}背影走动，大衣自然摆动，冬日白光，强调廓形，{关键锚点}自然可见"
        motion_arc_zh:
          A: "背影走动，然后大衣摆动，然后停顿"
          B: "侧面慢走，然后衣摆轻摆，然后廓形停住"
          C: "冬日街景里背影移动，然后衣摆摆动，然后氛围停留"
