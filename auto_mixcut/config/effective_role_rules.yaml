effective_role_rules:
  - name: trusted_core
    when: high_or_medium_trust_and_product_match_and_low_risk
    effective_roles: [hero, detail, result, scene, ending]
  - name: medium_uncertain
    when: source_trust_level=medium and product_match_status=uncertain
    effective_roles: [scene, ending]
  - name: low_trust
    when: source_trust_level=low and risk_level=low and has_watermark=no
    effective_roles: [scene, ending]
  - name: ai_generated_consistency_not_pass
    when: source_type=ai_generated and frame_consistency_status!=pass
    effective_roles: [scene, ending]
  - name: repairable_bottom_subtitle
    when: text_overlay_risk=bottom_caption_repairable or reason contains bottom local-language subtitle without product/face/hand obstruction
    effective_roles: [detail, result, scene, ending]
    notes: only bottom small-area hard subtitles are allowed; render applies light bottom crop and avoids first slot.
  - name: unusable_hard_subtitle
    when: foreign/local subtitle is middle/large/multi-line/scrolling or obstructs product/face/hands, or platform UI/watermark text
    effective_roles: []
    notes: do not enter render plan; no AI inpainting or heavy repair by default.
  - name: blocked
    when: risk_level in [medium, high] or has_watermark=yes or mixcut_usability=no
    effective_roles: []
