    content_expression_route: [近景符号展示, 轻口播解释寓意, 日常出门前戴上]
    risk_flags: [寓意表达过重, 容易变成广告感, 本地文化适配需谨慎]
mutual_exclusion_rules:
  - id: ER-001
    directions: [少女礼物感型, 幸运寓意型]
    priority_direction: 幸运寓意型
    keywords: [四叶草, 爱心, 星月, 幸运, 寓意]
    rule: 如果命中四叶草/爱心/星月/幸运/寓意，则优先匹配幸运寓意型；否则匹配少女礼物感型。
  - id: ER-002
    directions: [珍珠锆石气质型, 高存在感拍照型]
    priority_direction: 高存在感拍照型
    keywords: [中长款, 长款, 大体量, 造型明显, 大耳圈, 大耳坠]
    rule: 如果耳饰为中长款/长款/大体量/造型明显，则优先匹配高存在感拍照型；否则匹配珍珠锆石气质型。
  - id: ER-003
    directions: [韩系轻通勤型, 珍珠锆石气质型]
    priority_direction: 珍珠锆石气质型
    keywords: [珍珠, 锆石, 微闪, 气质]
    rule: 如果主元素为珍珠/锆石且有微闪/气质表达，则优先匹配珍珠锆石气质型；否则匹配韩系轻通勤型。
