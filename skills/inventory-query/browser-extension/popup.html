<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BigSeller Auth Sync</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .header img {
      width: 32px;
      height: 32px;
      margin-right: 12px;
    }
    
    .header h1 {
      font-size: 16px;
      margin: 0;
      color: #333;
    }
    
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .status.active {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status.inactive {
      background: #fff3e0;
      color: #e65100;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .info-label {
      color: #999;
    }
    
    .info-value {
      color: #333;
      font-weight: 500;
    }
    
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #1976d2;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1565c0;
    }
    
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .btn-success {
      background: #4caf50;
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
    
    .token-preview {
      font-family: monospace;
      font-size: 11px;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      word-break: break-all;
      margin-top: 8px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Icon">
    <h1>认证自动同步</h1>
  </div>
  
  <div id="status" class="status">
    <div class="loading">正在加载...</div>
  </div>
  
  <div id="info" class="info" style="display: none;">
    <div class="info-item">
      <span class="info-label">监控状态:</span>
      <span class="info-value" id="monitoring-status">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">认证状态:</span>
      <span class="info-value" id="token-status">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">最后同步:</span>
      <span class="info-value" id="last-sync">-</span>
    </div>
  </div>
  
  <div id="token-preview" class="token-preview" style="display: none;"></div>
  
  <button id="sync-now" class="btn-primary">立即同步</button>
  <button id="check-server" class="btn-secondary">检查服务器</button>
  <button id="toggle-monitoring" class="btn-secondary">切换监控</button>
  <button id="open-settings" class="btn-secondary">打开配置</button>
  
  <script src="popup.js"></script>
</body>
</html>
