# ==============================================================================
# 内头巾 prompt 覆盖块(prompt_overrides)
# ==============================================================================
# 设计:不重写引擎通用 prompt,而是利用现有 {{占位符}} 注入点,
#       把内头巾的"钩子/瑕疵/场景/真实感/proof让位"做成注入块喂进去。
# 对齐现有 prompts.py 的注入点(占位符):
#   {{account_style_boundary}}            -> 账号调性(删轻精致,改真实原生)
#   {{category_execution_contract_rules}} -> 商品硬约束(内头巾事实)
#   {{product_selling_note_rules}}        -> 卖点->钩子注入
#   {{human_performance_contract_rules}}  -> 人物表演(素人不完美)
#   {{light_control_rules}}               -> 光线/真实感控制
#   {{hair_accessory_rules}}              -> 复用为内头巾专属规则
# 新增引擎注入点(引擎需补充支持):
#   {{pain_hook_rules}} {{raw_texture_rules}} {{scene_pool_rules}}
#   {{proof_clarity_rules}} {{anti_template_rules}}
# ==============================================================================

meta:
  category: hesturi
  country: MY

# ------------------------------------------------------------------------------
# 1. 账号调性(覆盖原"轻精致/可挂主页",改为真实原生)— 决策2
# ------------------------------------------------------------------------------
account_style_boundary: |
  【账号调性 · 内头巾】
  本账号追求真实、接地气的马来素人原生感,不是精致广告片。
  - 像普通马来女性随手拍下的生活片段,而不是品牌宣传片。
  - 允许并鼓励:手机直拍、自然光、背景有生活杂物、素人不完美、口语化表达。
  - 严禁:棚拍广告质感、网红精修脸、ins风极简布景、播音腔/测评腔。
  - 唯一例外(proof 镜头):证明痛点的镜头必须拍清楚,清晰度优先于粗糙感。

# ------------------------------------------------------------------------------
# 2. 商品硬约束(category_execution_contract)— 内头巾不可违背的事实
# ------------------------------------------------------------------------------
category_execution_contract_rules: |
  【商品硬约束 · 内头巾(inner / anak tudung)】
  - 内头巾是穆斯林女性戴外层头巾时贴身打底的"头巾内衬",日常每天必戴、高频复购的功能型刚需品。
  - 佩戴在头部,贴合发际线,包覆头发;镜头必须体现这一佩戴关系。
  - 禁止表现为外层时尚头巾/盖头本身(那是另一品类)。
  - 禁止凭空编造数据、认证、夸大功效;只呈现可视化可证的事实。

# ------------------------------------------------------------------------------
# 3. 卖点->钩子注入(product_selling_note)— 决策1
#    引擎据 selling_point 路由出主钩子后,把该钩子的证明任务注入这里。
#    下方为模板,{{}} 由引擎用 pain_hooks.yaml 的命中钩子填充。
# ------------------------------------------------------------------------------
product_selling_note_rules_template: |
  【核心使命 · 主钩子驱动】
  本产品主打卖点 = {{selling_point}},已锁定主钩子 = {{main_hook_id}}({{main_hook_pain}})。
  本条视频的核心使命:把"{{main_hook_pain}}"这个痛点的解决,拍成一个肉眼可证的瞬间。
  - 主钩子在 S1-S4 间统一(都证明主卖点),靠不同"证明角度"区分:
    本条采用证明角度 = {{proof_angle}}。
  - 画面证明指令:{{main_hook_visual_brief}}
  - 口播意图(用马来语自然表达,非逐字):{{main_hook_voice_intent}}
  - 辅钩子(若有,不得抢主钩子戏份):{{aux_hook_id}}

# ------------------------------------------------------------------------------
# 4. 人物表演(human_performance_contract)— 素人不完美,删"顺眼/比例成立"
# ------------------------------------------------------------------------------
human_performance_contract_rules: |
  【人物表演 · 素人真实】
  - 出镜为普通马来女性,日常长相,素颜感或淡妆,不要网红脸/精修磨皮。
  - 表情自然不摆拍,动作随意像在过日子;允许轻微不完美(走神、自然停顿)。
  - 口播口语化,可带 emm / tau tak / kan 等语气词,允许轻微磕巴。
  - 删除"人物必须顺眼/搭配完整/比例成立"等精致约束——真实自然即可。
  - 不做专业情绪弧线调度;素人就是平实地边戴边说,越不像表演越好。

# ------------------------------------------------------------------------------
# 5. 真实感/瑕疵控制(注入到 light_control / 新增 raw_texture)— 对抗美颜惯性
#    引擎据 authenticity_level(默认 natural)从 raw_texture_lexicon.yaml 取词填充。
# ------------------------------------------------------------------------------
raw_texture_rules_template: |
  【真实感注入 · 当前档位={{authenticity_level}}】
  非 proof 镜头(开场/转场/氛围/口播过场)按以下方向注入真实粗糙感:
  - 器材:{{camera_positive}}
  - 光线:{{light_positive}}
  - 环境:{{environment_positive}}
  - 人物:{{person_positive}}
  - 口播:{{speech_positive}}
  严禁出现(塑料默认值):{{negative_list}}

# ------------------------------------------------------------------------------
# 6. ★ proof 镜头清晰度让位规则 — 决策2 核心
# ------------------------------------------------------------------------------
proof_clarity_rules: |
  【proof 镜头清晰度优先】
  标记为证明镜头(对比/特写/数数量/勒痕/碎发等)的 shot:
  - 必须:稳、对焦准、光线足,让用户肉眼看清结果。
  - 禁止:手抖糊掉细节、过曝盖掉证明、杂物遮挡证明主体。
  - 这些镜头不注入相机抖动/过曝等粗糙感(粗糙感只放非证明镜头)。
  - 若证明被瑕疵糊掉,视为不合格,需重拍/重写。

# ------------------------------------------------------------------------------
# 7. 场景注入(scene_pool)— 解绑"家中"垄断
#    引擎据 scene_pool.yaml 轮换选场景后填充。
# ------------------------------------------------------------------------------
scene_pool_rules_template: |
  【场景 · 马来真实生活】
  本条场景 = {{scene_label}}({{scene_visual_brief}})。
  - 不要把所有视频都拍在家中镜前;真实马来 TikTok 在车里/店里/厨房/抱娃/门口都拍。
  - 优先选真实感加成高的场景,环境复杂度本身能压制 AI 的塑料感。

# ------------------------------------------------------------------------------
# 8. 反同质化(anti_template)— 配合去重引擎
#    引擎把"最近用过的开场/场景/证明角度/句式"填入 forbidden_recent_pool。
# ------------------------------------------------------------------------------
anti_template_rules_template: |
  【反雷同 · 强制避开最近用过的】
  最近 {{dedup_window}} 条同产品脚本已用过以下元素,本条必须避开:
  - 已用开场钩子:{{forbidden_openings}}
  - 已用场景:{{forbidden_scenes}}
  - 已用证明角度:{{forbidden_proof_angles}}
  - 已用首句句式:{{forbidden_first_lines}}
  多样性随机种子 = {{diversity_seed}}(用它打破默认表达惯性,产出不同骨架)。
