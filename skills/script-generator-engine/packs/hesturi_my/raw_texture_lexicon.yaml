# ==============================================================================
# 真实感 / 瑕疵注入词库 —— 对抗 AI 视频模型的"美颜惯性"
# ==============================================================================
# 核心命题(已与用户确认):
#  - 下游是 AI 视频模型出片,真实感这场仗 100% 打在提示词工程上。
#  - 必须主动"污染"模型,逼它吐出过曝/手抖/杂乱/不完美,否则默认棚拍塑料感。
#  - ★决策2:proof 证明镜头清晰度优先 —— 粗糙感只放非 proof 镜头。
#  - 词库做成外部 YAML,看出片效果后可持续迭代,改词不改代码。
# ==============================================================================

meta:
  category: hesturi
  country: MY
  note: "AI 模型未必完全听话,需据真实出片反复回测迭代本词库"

# ------------------------------------------------------------------------------
# 一、五维粗糙词库(positive=要注入的真实感词 / negative=要禁止的塑料默认值)
# ------------------------------------------------------------------------------
dimensions:

  camera:
    label: "拍摄器材感"
    positive:
      - "手机前置/后置直拍,竖屏满画幅 9:16"
      - "轻微手持晃动,不用稳定器"
      - "对焦偶尔轻微拉风箱后回正"
      - "像随手举起手机拍的生活片段"
    negative:
      - "稳定器顺滑运镜"
      - "电影级镜头/电影感调色"
      - "无人机/滑轨炫技运镜"
      - "专业摄影棚多机位"

  light:
    label: "光线"
    positive:
      - "室内自然光,偏暗或窗边轻过曝"
      - "白平衡略偏黄/偏暖,不精准"
      - "不补光、不打柔光"
      - "光线随手机自动曝光轻微波动"
    negative:
      - "柔光箱/环形灯/影棚布光"
      - "高级氛围光、电影布光"
      - "完美均匀打光"

  environment:
    label: "环境"
    positive:
      - "背景有生活杂物(衣架/水杯/纸巾盒/挂衣)"
      - "墙面普通、家里随意角落"
      - "店里货架/车里/厨房等真实场所"
      - "不刻意收拾的真实生活空间"
    negative:
      - "极简白墙/ins 风布景"
      - "空无一物的干净背景"
      - "刻意摆拍的精致场景"

  person:
    label: "人物"
    positive:
      - "普通马来女性,日常长相"
      - "素颜感或淡妆,不浓妆"
      - "表情自然不摆拍,可有轻微不完美"
      - "动作随意、像在过日子"
    negative:
      - "网红脸/精修磨皮"
      - "模特感/完美妆容"
      - "刻意凹造型摆 pose"

  speech:
    label: "口播表达"
    positive:
      - "口语化,像随口说"
      - "可有 emm / tau tak / kan 等马来语气词"
      - "允许轻微磕巴、重复、自然停顿"
      - "不像念稿、不像广告腔"
    negative:
      - "字正腔圆播音腔"
      - "测评腔/广告腔"
      - "完整无瑕的脚本朗读感"

# ------------------------------------------------------------------------------
# 二、真实感三档配置(authenticity_level)
# ------------------------------------------------------------------------------
# 决策3:三档全建,内头巾默认 natural,高客单品未来切 light。
# 每档定义各维度的"粗糙强度"(full=全开 / mild=轻度 / off=关闭走精致)。
# ------------------------------------------------------------------------------
authenticity_levels:

  raw:
    label: "原生粗糙(最大化,备用,内头巾不默认用)"
    camera: full
    light: full
    environment: full
    person: full
    speech: full

  natural:                       # ★ 内头巾默认
    label: "原生但稳得住、看得清结果(默认)"
    camera: mild                 # 轻晃可以,但不到糊
    light: mild                  # 自然光但不至于看不清
    environment: full            # 环境杂乱全开(最安全的真实感来源)
    person: full                 # 素人不完美全开
    speech: full                 # 口语碎句全开

  light:
    label: "轻精致(未来即时盖头/高客单品用)"
    camera: off
    light: off
    environment: mild
    person: mild
    speech: mild

default_level: natural

# ------------------------------------------------------------------------------
# 三、★ proof 镜头清晰度让位规则(决策2 核心)
# ------------------------------------------------------------------------------
# 当"极致粗糙"与"把痛点证明拍清楚"冲突 -> 优先证明看得清。
# ------------------------------------------------------------------------------
proof_shot_override:
  applies_to: "is_proof_shot == true 的镜头(对比/特写/数数量/勒痕/碎发等证明镜头)"
  rules:
    - "强制:稳、对焦准、光线足,让用户肉眼看清结果"
    - "禁止:手抖糊掉细节、过曝盖掉证明、杂物遮挡证明主体"
    - "camera/light 维度在 proof 镜头一律降到 off(不注入粗糙)"
    - "environment 维度仍可保留(背景杂物不影响证明主体即可)"
  non_proof_shots: "开场/转场/氛围/口播过场镜头 -> 按 authenticity_level 粗糙全开"
  quality_gate: "proof 镜头若被瑕疵糊掉 -> P5 质检 proof_clarity_score 不达标,打回 P6"
